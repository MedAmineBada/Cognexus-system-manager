<body style="margin:0; padding:0; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family:'Segoe UI', Arial, Helvetica, sans-serif; min-height:100vh;">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

  <!-- Outer wrapper -->
  <div style="padding:48px 16px;">

    <!-- Card -->
    <div style="
        max-width:620px;
        margin:0 auto;
        background:#ffffff;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 25px 60px rgba(0,0,0,0.18);
    ">

      <!-- Header -->
      <div style="
          background:#ffffff;
          padding:28px 40px;
          border-bottom:1px solid #f3f4f6;
      ">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <!-- Left: Cognexus wordmark -->
            <td align="left" style="width:50%;">
              <span style="
                  font-family:'Orbitron', 'Segoe UI', Arial, sans-serif;
                  font-size:24px;
                  font-weight:700;
                  background:linear-gradient(135deg, #667eea, #764ba2);
                  -webkit-background-clip:text;
                  -webkit-text-fill-color:transparent;
                  background-clip:text;
                  letter-spacing:1px;
              ">
                COGNEXUS
              </span>
            </td>

            <!-- Right: Logo -->
            <td align="right" style="width:50%;">
              <img
                src="https://res.cloudinary.com/dcelxp0d4/image/upload/v1778756514/cognexus-logo_illt2m.png"
                alt="Cognexus Logo"
                style="height:40px; display:block;"
              >
            </td>
          </tr>
        </table>
      </div>

      <!-- Accent Line -->
      <div style="
          height:4px;
          background:linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      "></div>

      <!-- Body -->
      <div style="padding:44px 40px 44px 40px;">

        <!-- Title -->
        <h2 style="
            margin:0 0 6px 0;
            color:#111827;
            font-size:26px;
            font-weight:700;
            letter-spacing:-0.3px;
            line-height:1.3;
        ">
          {{ title }}
        </h2>

        <!-- Title underline -->
        <div style="
            width:48px;
            height:3px;
            background:linear-gradient(90deg, #667eea, #764ba2);
            border-radius:2px;
            margin-bottom:28px;
        "></div>

        <!-- Divider -->
        <div style="
            height:1px;
            background:linear-gradient(90deg, #e5e7eb, transparent);
            margin-bottom:28px;
        "></div>

        <!-- Content -->
        <div style="
            color:#374151;
            font-size:16px;
            line-height:1.9;
            white-space:pre-line;
        ">
          {{ content }}
        </div>

      </div>

      <!-- Footer -->
      <div style="
          background:#f9fafb;
          border-top:1px solid #f3f4f6;
          padding:24px 40px;
          text-align:center;
      ">
        <p style="
            margin:0 0 10px 0;
            color:#6b7280;
            font-size:12px;
            font-weight:500;
        ">
          This is an automated email — please do not reply directly to this message.
        </p>

        <p style="
            margin:0;
            color:#9ca3af;
            font-size:12px;
        ">
          © 2026 Cognexus. All rights reserved.
        </p>
      </div>

    </div>

  </div>

</body>
